name: Azure OIDC Login

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  azure-login:
    runs-on: ubuntu-latest
    steps:
      - name: Azure Login via OIDC
        uses: azure/login@v2
        with:
          client-id: "${{ secrets.AZURE_CLIENT_ID }}"
          tenant-id: "${{ secrets.AZURE_TENANT_ID }}"
          subscription-id: "${{ secrets.AZURE_SUBSCRIPTION_ID }}"

	  - name: Read Flag
		run: |
		  az storage blob download \
		    --account-name iamazurelab35a817183 \
		    --container-name flag \
		    --name flag.txt \
		    --file flag.txt \
		    --auth-mode login
		    cat flag.txt
